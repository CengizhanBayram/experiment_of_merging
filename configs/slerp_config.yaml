# SLERP Merge Configuration
# Merges two Turkish LLM models using Spherical Linear Interpolation
# Output: Cosmobillian/TR-Llama-8B-Cosmos-Trendyol_SLERP_v1

merge_method: slerp
dtype: bfloat16

# Base model (SLERP'te tokenizer seçimi ve referans için gerekli)
base_model: ytu-ce-cosmos/Turkish-Llama-8b-Instruct-v0.1

models:
  - model: ytu-ce-cosmos/Turkish-Llama-8b-Instruct-v0.1
  - model: Trendyol/Trendyol-LLM-8b-chat-v2.0

parameters:
  t: 0.5  # 0.0 = tamamen Model A, 1.0 = tamamen Model B

# ──────────────────────────────────────────────
# Alternatif t değerleri (yorum satırı olarak):
# ──────────────────────────────────────────────
# Model A'ya daha yakın (Türkçe ağırlıklı):
#   t: 0.3
#
# Model B'ye daha yakın (Trendyol ağırlıklı):
#   t: 0.7
