# DARE Merge Configuration (2-way)
# Merges two Turkish LLM models using DARE-TIES strategy
# (Drop And REscale with TIES sign election)
# Output: Cosmobillian/TR-Llama-8B-3way_DARE_v1

merge_method: dare_ties
dtype: bfloat16
normalize: true

# Base model - ungated mirror (orijinal meta-llama/Meta-Llama-3-8B gated)
base_model: NousResearch/Meta-Llama-3-8B

models:
  - model: ytu-ce-cosmos/Turkish-Llama-8b-Instruct-v0.1
    parameters:
      weight: 0.6
      density: 0.5
  - model: Trendyol/Trendyol-LLM-8b-chat-v2.0
    parameters:
      weight: 0.4
      density: 0.5

parameters:
  normalize: true
  int8_mask: true

# ──────────────────────────────────────────────
# Alternatif density degerleri (yorum satırı):
# ──────────────────────────────────────────────
# Dusuk density (agresif drop): 0.3
# Yuksek density (muhafazakar): 0.7
