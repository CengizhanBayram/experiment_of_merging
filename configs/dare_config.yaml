# DARE Merge Configuration
# Merges three Turkish LLM models using DARE-TIES strategy
# (Drop And REscale with TIES sign election)
# Output: Cosmobillian/TR-Llama-8B-3way_DARE_v1

merge_method: dare_ties
dtype: bfloat16
normalize: true

# Base model for computing task vectors
base_model: meta-llama/Meta-Llama-3-8B

models:
  - model: ytu-ce-cosmos/Turkish-Llama-8b-Instruct-v0.1
    parameters:
      weight: 0.4
      density: 0.5
  - model: Trendyol/Trendyol-LLM-8b-chat-v2.0
    parameters:
      weight: 0.35
      density: 0.5
  - model: malhajar/Mistral-7b-tr
    parameters:
      weight: 0.25
      density: 0.5

parameters:
  normalize: true
  int8_mask: true

# ──────────────────────────────────────────────
# Alternatif density değerleri (yorum satırı olarak):
# ──────────────────────────────────────────────
# Düşük density (daha agresif drop):
#   density: 0.3
#
# Yüksek density (daha muhafazakar):
#   density: 0.7
#
# Alternatif ağırlıklar ile düşük density:
#   - model: ytu-ce-cosmos/Turkish-Llama-8b-Instruct-v0.1
#     parameters:
#       weight: 0.5
#       density: 0.3
#   - model: Trendyol/Trendyol-LLM-8b-chat-v2.0
#     parameters:
#       weight: 0.3
#       density: 0.3
#   - model: malhajar/Mistral-7b-tr
#     parameters:
#       weight: 0.2
#       density: 0.3
