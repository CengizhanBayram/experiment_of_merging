# TIES Merge Configuration
# Merges three Turkish LLM models using TIES (TrIm, Elect, Sum) strategy
# Output: Cosmobillian/TR-Llama-8B-3way_TIES_v1

merge_method: ties
dtype: bfloat16
normalize: true

# Base model for computing task vectors
base_model: meta-llama/Meta-Llama-3-8B

models:
  - model: ytu-ce-cosmos/Turkish-Llama-8b-Instruct-v0.1
    parameters:
      weight: 0.5
      density: 0.7
  - model: Trendyol/Trendyol-LLM-8b-chat-v2.0
    parameters:
      weight: 0.3
      density: 0.7
  - model: malhajar/Mistral-7b-tr
    parameters:
      weight: 0.2
      density: 0.7

parameters:
  normalize: true
  int8_mask: true

